services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bownerfinder
      POSTGRES_USER: bownerfinder
      POSTGRES_PASSWORD: bownerfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bownerfinder -d bownerfinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://bownerfinder:bownerfinder@postgres:5432/bownerfinder
      REDIS_URL: redis://redis:6379/0
      JOB_EXECUTION_MODE: queue
      UPLOAD_DIR: /app/storage/uploads
      RESULT_DIR: /app/storage/results
      EXPORT_DIR: /app/storage/exports
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: python worker.py
    environment:
      DATABASE_URL: postgresql+psycopg://bownerfinder:bownerfinder@postgres:5432/bownerfinder
      REDIS_URL: redis://redis:6379/0
      JOB_EXECUTION_MODE: queue
      UPLOAD_DIR: /app/storage/uploads
      RESULT_DIR: /app/storage/results
      EXPORT_DIR: /app/storage/exports
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

